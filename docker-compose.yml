services:
  backend:
    build:
      context: ./backend
    container_name: cloudcart-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
    container_name: cloudcart-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend