apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: cloudcart

spec:
  replicas: 3

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: dharshanplans/cloudcart-frontend:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 80